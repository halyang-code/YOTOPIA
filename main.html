<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YOTOPIA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
      background: #F5EDE8;
      min-height: 100vh;
      padding-bottom: 72px;
      color: #664B3A;
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #F5EDE8;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-nav .brand {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .top-nav .brand img {
      height: 26px;
    }
    .top-nav .brand span {
      font-size: 16px;
      font-weight: 700;
      color: #664B3A;
      letter-spacing: 1px;
    }
    .top-nav .profile-btn {
      background: none;
      border: none;
      font-size: 13px;
      color: #9A8A7E;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .top-nav .profile-btn:active {
      background: rgba(102,75,58,0.08);
    }

    .page {
      display: none;
      padding: 0 20px 20px;
      animation: fadeIn 0.2s ease;
    }
    .page.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-title {
      font-size: 18px;
      font-weight: 600;
      color: #664B3A;
      margin-bottom: 16px;
    }

    .pet-card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(102,75,58,0.06);
      margin-bottom: 16px;
    }
    .pet-card .pet-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .pet-card .pet-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      background: #F0E8E2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #C4B5A9;
      flex-shrink: 0;
    }
    .pet-card .pet-name {
      font-size: 18px;
      font-weight: 600;
      color: #664B3A;
      margin-bottom: 2px;
    }
    .pet-card .pet-meta {
      font-size: 13px;
      color: #9A8A7E;
      line-height: 1.6;
    }
    .pet-card .pet-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .pet-card .pet-actions button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      background: #F5EDE8;
      color: #664B3A;
      transition: background 0.2s;
    }
    .pet-card .pet-actions button:active {
      background: #E8DDD6;
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #C4B5A9;
    }
    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
    .empty-state p {
      font-size: 14px;
      line-height: 1.8;
    }

    .card-preview-box {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(102,75,58,0.06);
      margin-bottom: 16px;
    }

    .profile-card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(102,75,58,0.06);
    }
    .profile-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #F0E8E2;
    }
    .profile-row:last-of-type {
      border-bottom: none;
    }
    .profile-row .label {
      font-size: 14px;
      color: #9A8A7E;
    }
    .profile-row .value {
      font-size: 14px;
      color: #664B3A;
      font-weight: 500;
    }
    .profile-row button {
      background: none;
      border: none;
      color: #664B3A;
      font-size: 13px;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .profile-row button:active {
      background: #F0E8E2;
    }
    .logout-btn {
      width: 100%;
      padding: 14px;
      background: #FFF0EE;
      color: #C0392B;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 16px;
      transition: opacity 0.2s;
    }
    .logout-btn:active {
      opacity: 0.7;
    }

    .bottom-tab {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      display: flex;
      border-top: 1px solid #F0E8E2;
      padding: 6px 0;
      padding-bottom: max(6px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .tab-item {
      flex: 1;
      text-align: center;
      padding: 6px 0;
      cursor: pointer;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-item .tab-icon {
      font-size: 20px;
      display: block;
      margin-bottom: 2px;
    }
    .tab-item .tab-label {
      font-size: 11px;
      color: #C4B5A9;
      letter-spacing: 0.3px;
    }
    .tab-item.active .tab-label {
      color: #664B3A;
      font-weight: 600;
    }

    .brand-slogan {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #DBC6B4;
      letter-spacing: 1px;
    }

    .feedback-tag {
      display: inline-block;
      background: #E8F0E8;
      color: #2D7D46;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 10px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="brand">
      <span>🐾 YOTOPIA</span>
    </div>
    <button class="profile-btn" onclick="switchTab('profile')">👤 我的</button>
  </nav>

  <div id="page-home" class="page active">
    <div id="pet-card-container"></div>
    <div class="brand-slogan">让陪伴，融入自然</div>
  </div>

  <div id="page-pets" class="page">
    <div class="page-title">🐱 我的宠物</div>
    <div id="pet-detail-container"></div>
  </div>

  <div id="page-card" class="page">
    <div class="page-title">🎴 专属卡片</div>
    <div id="card-content-area"></div>
  </div>

  <div id="page-profile" class="page">
    <div class="page-title">👤 我的</div>
    <div class="profile-card">
      <div class="profile-row">
        <span class="label">微信号</span>
        <span class="value" id="profile-wechat">-</span>
      </div>
      <div class="profile-row">
        <span class="label">昵称</span>
        <span class="value" id="profile-name">-</span>
      </div>
      <div class="profile-row">
        <span class="label">修改密码</span>
        <button onclick="handleChangePassword()">修改 →</button>
      </div>
      <button class="logout-btn" onclick="handleLogout()">退出登录</button>
    </div>
  </div>

  <div class="bottom-tab">
    <div class="tab-item active" onclick="switchTab('home')" data-tab="home">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">首页</span>
    </div>
    <div class="tab-item" onclick="switchTab('pets')" data-tab="pets">
      <span class="tab-icon">🐱</span>
      <span class="tab-label">宠物</span>
    </div>
    <div class="tab-item" onclick="switchTab('card')" data-tab="card">
      <span class="tab-icon">🎴</span>
      <span class="tab-label">专属卡片</span>
    </div>
    <div class="tab-item" onclick="switchTab('profile')" data-tab="profile">
      <span class="tab-icon">👤</span>
      <span class="tab-label">我的</span>
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://yotopia.pet';
    let currentUser = null;
    let userPets = [];

    (function() {
      const stored = localStorage.getItem('yotopia_user');
      if (!stored) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = JSON.parse(stored);
      loadProfile();
      loadPets();
    })();

    function switchTab(tab) {
      document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
      document.getElementById('page-' + tab).classList.add('active');
      document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
      const activeTab = document.querySelector(`.tab-item[data-tab="${tab}"]`);
      if (activeTab) activeTab.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });

      if (tab === 'card') {
        loadMyCard();
      }
    }

    // ===== localStorage 已反馈卡片管理 =====
    function getFeedbackCardIds() {
      try {
        return JSON.parse(localStorage.getItem('yotopia_feedback_done') || '[]');
      } catch { return []; }
    }

    function addFeedbackCardId(cardId) {
      const list = getFeedbackCardIds();
      const idStr = String(cardId);
      if (!list.includes(idStr)) {
        list.push(idStr);
        localStorage.setItem('yotopia_feedback_done', JSON.stringify(list));
      }
    }

    async function loadPets() {
      try {
        const res = await fetch(`${WORKER_URL}/api/my-pets`, {
          headers: { 'X-User-Id': currentUser.id }
        });
        const data = await res.json();
        if (data.success && data.pets) {
          userPets = data.pets;
        }
      } catch (e) {
        console.error('获取宠物失败:', e);
      }
      renderPets();
    }

    function renderPets() {
      const cardContainer = document.getElementById('pet-card-container');
      const detailContainer = document.getElementById('pet-detail-container');

      if (!userPets || userPets.length === 0) {
        cardContainer.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🐾</div>
            <p>还没有添加宠物<br>请联系管理员添加 🐱</p>
          </div>
        `;
        detailContainer.innerHTML = '';
        return;
      }

      cardContainer.innerHTML = userPets.map(pet => {
        const photoHtml = pet.photo_url
          ? `<img class="pet-avatar" src="${pet.photo_url}" alt="${pet.name}">`
          : `<div class="pet-avatar">🐱</div>`;
        return `
          <div class="pet-card">
            <div class="pet-row">
              ${photoHtml}
              <div>
                <div class="pet-name">${pet.name || '未命名'}</div>
                <div class="pet-meta">
                  ${pet.birthday ? '🎂 ' + pet.birthday : ''}
                  ${pet.gender ? ' ｜ ' + (pet.gender === 'male' ? '♂ 男孩' : '♀ 女孩') : ''}
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      let detailHtml = '';
      userPets.forEach(p => {
        const pPhoto = p.photo_url
          ? `<img class="pet-avatar" src="${p.photo_url}" alt="${p.name}">`
          : `<div class="pet-avatar">🐱</div>`;

        detailHtml += `
          <div class="pet-card">
            <div class="pet-row">
              ${pPhoto}
              <div style="flex:1;">
                <div class="pet-name">${p.name || '未命名'}</div>
                <div class="pet-meta">
                  ${p.birthday ? '🎂 ' + p.birthday : ''}
                  ${p.gender ? ' ｜ ' + (p.gender === 'male' ? '♂ 男孩' : '♀ 女孩') : ''}
                </div>
              </div>
            </div>
            <div class="pet-actions">
              <button onclick="uploadPhoto('${p.id}')">📸 上传照片</button>
              <button onclick="editPet('${p.id}')">✏️ 编辑资料</button>
            </div>
          </div>
        `;
      });
      detailContainer.innerHTML = detailHtml;
    }

    function uploadPhoto(petId) {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = async function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append('pet_id', petId);
        formData.append('photo', file);
        try {
          const res = await fetch(`${WORKER_URL}/api/upload-photo`, {
            method: 'POST',
            headers: { 'X-User-Id': currentUser.id },
            body: formData
          });
          const data = await res.json();
          if (data.success) {
            alert('上传成功 ✅');
            loadPets();
          } else {
            alert(data.message || '上传失败');
          }
        } catch (e) {
          alert('网络错误，请稍后重试');
        }
      };
      input.click();
    }

    function editPet(petId) {
      const pet = userPets.find(p => p.id === petId);
      if (!pet) return;
      const name = prompt('宠物名字：', pet.name || '');
      if (name === null) return;
      const birthday = prompt('生日（如 2024-01-01）：', pet.birthday || '');
      if (birthday === null) return;
      const gender = prompt('性别（male / female）：', pet.gender || '');
      if (gender === null) return;

      fetch(`${WORKER_URL}/api/update-pet`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-User-Id': currentUser.id
        },
        body: JSON.stringify({ pet_id: petId, name, birthday, gender })
      }).then(r => r.json()).then(d => {
        if (d.success) {
          alert('已更新 ✅');
          loadPets();
        } else {
          alert(d.message || '更新失败');
        }
      });
    }

    // ===== 专属卡片（支持多张 + 事件委托 + 已反馈锁定）=====
    async function loadMyCard() {
      const container = document.getElementById('card-content-area');
      container.innerHTML = '<div style="text-align:center;padding:40px;color:#C4B5A9;">加载中...</div>';

      try {
        const res = await fetch(`${WORKER_URL}/api/my-card`, {
          headers: { 'X-User-Id': currentUser.id }
        });
        const data = await res.json();

        if (!data.success || !data.cards || data.cards.length === 0) {
          container.innerHTML = `
            <div class="card-preview-box" style="padding:48px 24px;">
              <div style="font-size:52px;margin-bottom:16px;opacity:0.3;">🎴</div>
              <div style="font-size:14px;color:#C4B5A9;line-height:1.8;">
                暂无专属卡片<br>
                <small style="font-size:12px;color:#DBC6B4;">请联系管理员制作</small>
              </div>
            </div>
          `;
          return;
        }

        // 读取已反馈的卡片ID列表
        const doneIds = getFeedbackCardIds();

        // 遍历所有卡片
        container.innerHTML = data.cards.map(card => {
          const isDone = doneIds.includes(String(card.id));

          if (isDone) {
            // ---- 已反馈：显示已确认状态，按钮灰色禁用 ----
            return `
              <div class="card-preview-box">
                <img src="${card.image_url}" style="width:100%;max-width:320px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1);margin-bottom:16px;">
                <div class="feedback-tag">✅ 已确认反馈</div>
                <p style="font-size:13px;color:#C4B5A9;margin-top:8px;">感谢你的反馈，如有新卡片会第一时间展示</p>
              </div>
            `;
          } else {
            // ---- 未反馈：显示两个按钮 ----
            return `
              <div class="card-preview-box">
                <img src="${card.image_url}" style="width:100%;max-width:320px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1);margin-bottom:16px;">
                <p style="font-size:13px;color:#9A8A7E;margin-bottom:16px;">这是你的专属卡片，请确认是否满意</p>
                <div style="display:flex;gap:12px;justify-content:center;">
                  <button class="card-btn-satisfied" data-card-id="${card.id}" style="flex:1;max-width:160px;padding:12px;background:#664B3A;color:#DBC6B4;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">✅ 满意并提交</button>
                  <button class="card-btn-unsatisfied" data-card-id="${card.id}" style="flex:1;max-width:160px;padding:12px;background:#FFF0EE;color:#C0392B;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">🔄 不满意需要修改</button>
                </div>
              </div>
            `;
          }
        }).join('');

        // ---- 事件委托 ----
        container.onclick = function(e) {
          const target = e.target;
          const cardId = target.getAttribute('data-card-id');
          if (!cardId) return;

          if (target.classList.contains('card-btn-satisfied')) {
            submitSatisfied(cardId);
          } else if (target.classList.contains('card-btn-unsatisfied')) {
            openUnsatisfiedModal(cardId);
          }
        };

      } catch (e) {
        container.innerHTML = `<div class="card-preview-box" style="padding:48px 24px;"><div style="font-size:14px;color:#C4B5A9;">加载失败，请稍后重试</div></div>`;
      }
    }

    async function submitSatisfied(cardId) {
      // ---- 确认弹窗 ----
      if (!confirm('📝 确定提交「满意」反馈？\n\n提交后不能修改，请确认卡片效果满意后再提交。')) {
        return;
      }

      const formData = new FormData();
      formData.append('user_id', currentUser.id);
      formData.append('card_id', cardId);
      formData.append('satisfaction', 'satisfied');
      formData.append('comment', '');

      try {
        const res = await fetch(`${WORKER_URL}/api/card-feedback`, {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        if (data.success) {
          // 标记为已反馈
          addFeedbackCardId(cardId);
          alert('🎉 反馈已提交！感谢你的确认 ✅');
          loadMyCard();
        } else {
          alert('提交失败，请重试');
        }
      } catch (e) {
        alert('网络错误');
      }
    }

    function openUnsatisfiedModal(cardId) {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;';
      overlay.id = 'feedback-modal';

      overlay.innerHTML = `
        <div style="background:#fff;border-radius:20px;padding:24px;width:90%;max-width:380px;max-height:85vh;overflow-y:auto;">
          <h3 style="font-size:17px;color:#664B3A;margin-bottom:16px;">🔄 需要修改的内容</h3>

          <label style="font-size:13px;color:#9A8A7E;display:block;margin-bottom:4px;">请描述不满意的地方</label>
          <textarea id="feedback-comment" rows="4" style="width:100%;padding:12px;border:1.5px solid #F0E8E2;border-radius:10px;font-size:14px;color:#664B3A;background:#F9F5F2;outline:none;margin-bottom:16px;resize:vertical;" placeholder="例如：颜色不够柔和、字体太大、宠物照片不太像..."></textarea>

          <div style="margin-bottom:16px;">
            <label style="font-size:13px;color:#9A8A7E;display:block;margin-bottom:8px;">
              <input type="checkbox" id="feedback-replace-photo" onchange="togglePhotoUpload()">
               对图片不满意，我想上传一张新照片
            </label>
            <div id="feedback-photo-area" style="display:none;">
              <input type="file" id="feedback-photo-input" accept="image/*" style="font-size:13px;color:#664B3A;">
              <img id="feedback-photo-preview" style="width:100%;max-width:200px;border-radius:10px;margin-top:8px;display:none;">
            </div>
          </div>

          <p style="font-size:12px;color:#C0392B;margin-bottom:12px;">⚠️ 提交后不能修改，请确认内容无误</p>

          <div style="display:flex;gap:10px;">
            <button onclick="closeFeedbackModal()" style="flex:1;padding:12px;background:#F0E8E2;color:#9A8A7E;border:none;border-radius:10px;font-size:14px;cursor:pointer;">取消</button>
            <button onclick="submitUnsatisfied(${cardId})" style="flex:1;padding:12px;background:#C0392B;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">确认提交反馈</button>
          </div>
        </div>
      `;

      document.body.appendChild(overlay);
      overlay.addEventListener('click', e => { if (e.target === overlay) closeFeedbackModal(); });
    }

    function closeFeedbackModal() {
      const el = document.getElementById('feedback-modal');
      if (el) el.remove();
    }

    function togglePhotoUpload() {
      const area = document.getElementById('feedback-photo-area');
      const checked = document.getElementById('feedback-replace-photo').checked;
      area.style.display = checked ? 'block' : 'none';

      if (checked) {
        document.getElementById('feedback-photo-input').onchange = function(e) {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = ev => {
            const preview = document.getElementById('feedback-photo-preview');
            preview.src = ev.target.result;
            preview.style.display = 'block';
          };
          reader.readAsDataURL(file);
        };
      }
    }

    async function submitUnsatisfied(cardId) {
      const comment = document.getElementById('feedback-comment').value.trim();
      const photoInput = document.getElementById('feedback-photo-input');
      const photoFile = photoInput ? photoInput.files[0] : null;

      if (!comment && !photoFile) {
        alert('请至少填写文字说明或上传一张新照片');
        return;
      }

      const formData = new FormData();
      formData.append('user_id', currentUser.id);
      formData.append('card_id', cardId);
      formData.append('satisfaction', 'unsatisfied');
      formData.append('comment', comment);
      if (photoFile) formData.append('new_photo', photoFile);

      try {
        const res = await fetch(`${WORKER_URL}/api/card-feedback`, {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        if (data.success) {
          // 标记为已反馈
          addFeedbackCardId(cardId);
          alert('📩 反馈已提交！管理员会尽快修改 ✅');
          closeFeedbackModal();
          loadMyCard();
        } else {
          alert('提交失败，请重试');
        }
      } catch (e) {
        alert('网络错误');
      }
    }

    // ===== 我的页面 =====
    function loadProfile() {
      document.getElementById('profile-wechat').textContent = currentUser.wechat_id;
      document.getElementById('profile-name').textContent = currentUser.display_name || currentUser.wechat_id;
    }

    async function handleChangePassword() {
      const oldPw = prompt('请输入当前密码（首次设置请留空）：');
      if (oldPw === null) return;
      const newPw = prompt('请输入新密码（至少4位）：');
      if (!newPw || newPw.length < 4) { alert('密码至少4位'); return; }
      const confirmPw = prompt('请再次输入新密码：');
      if (newPw !== confirmPw) { alert('两次密码不一致'); return; }

      try {
        const res = await fetch(`${WORKER_URL}/api/change-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: currentUser.id,
            old_password: oldPw || '',
            new_password: newPw
          })
        });
        const data = await res.json();
        if (data.success) {
          alert('密码修改成功 ✅');
        } else {
          alert(data.message || '修改失败');
        }
      } catch (e) {
        alert('网络错误');
      }
    }

    function handleLogout() {
      if (!confirm('确认退出登录？')) return;
      localStorage.removeItem('yotopia_user');
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
