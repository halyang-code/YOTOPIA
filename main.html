<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YOTOPIA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
      background: #F5EDE8;
      min-height: 100vh;
      padding-bottom: 72px;
      color: #664B3A;
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #F5EDE8;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-nav .brand {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .top-nav .brand img {
      height: 26px;
    }
    .top-nav .brand span {
      font-size: 16px;
      font-weight: 700;
      color: #664B3A;
      letter-spacing: 1px;
    }
    .top-nav .profile-btn {
      background: none;
      border: none;
      font-size: 13px;
      color: #9A8A7E;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .top-nav .profile-btn:active {
      background: rgba(102,75,58,0.08);
    }

    .page {
      display: none;
      padding: 0 20px 20px;
      animation: fadeIn 0.2s ease;
    }
    .page.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-title {
      font-size: 18px;
      font-weight: 600;
      color: #664B3A;
      margin-bottom: 16px;
    }

    /* ===== 🆕 首页大图左右滑动样式 ===== */
    .home-pet-scroll {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      gap: 16px;
      padding: 8px 20px 16px;
      margin: 0 -20px;
      /* 隐藏滚动条 */
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .home-pet-scroll::-webkit-scrollbar {
      display: none;
    }
    .home-pet-card {
      flex: 0 0 calc(100vw - 56px);
      max-width: 400px;
      scroll-snap-align: center;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(102,75,58,0.08);
      transition: transform 0.2s;
    }
    .home-pet-card:active {
      transform: scale(0.98);
    }
    .home-pet-photo {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      background: #f0e8e2;
      display: block;
      cursor: pointer;
    }
    .home-pet-photo-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: linear-gradient(135deg, #f0e8e2 0%, #e8ddd6 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .home-pet-photo-placeholder:active {
      background: #ddd0c8;
    }
    .home-pet-photo-placeholder .placeholder-icon {
      font-size: 48px;
      margin-bottom: 8px;
      opacity: 0.6;
    }
    .home-pet-photo-placeholder .placeholder-text {
      font-size: 14px;
      color: #9A8A7E;
      font-weight: 500;
    }
    .home-pet-photo-placeholder .placeholder-sub {
      font-size: 12px;
      color: #C4B5A9;
      margin-top: 4px;
    }
    .home-pet-info {
      padding: 16px 20px 20px;
    }
    .home-pet-info .pet-name {
      font-size: 20px;
      font-weight: 600;
      color: #664B3A;
    }
    .home-pet-info .pet-meta {
      font-size: 13px;
      color: #9A8A7E;
      margin-top: 4px;
    }
    .home-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 0 0 4px;
      padding: 4px 0;
    }
    .home-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #DBC6B4;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .home-dot.active {
      width: 24px;
      border-radius: 4px;
      background: #664B3A;
    }
    /* ===== 原有的宠物卡片（宠物tab用） ===== */
    .pet-card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(102,75,58,0.06);
      margin-bottom: 16px;
    }
    .pet-card .pet-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .pet-card .pet-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      background: #F0E8E2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #C4B5A9;
      flex-shrink: 0;
    }
    .pet-card .pet-name {
      font-size: 18px;
      font-weight: 600;
      color: #664B3A;
      margin-bottom: 2px;
    }
    .pet-card .pet-meta {
      font-size: 13px;
      color: #9A8A7E;
      line-height: 1.6;
    }
    .pet-card .pet-actions {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .pet-card .pet-actions button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      background: #F5EDE8;
      color: #664B3A;
      transition: background 0.2s;
    }
    .pet-card .pet-actions button:active {
      background: #E8DDD6;
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #C4B5A9;
    }
    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
    .empty-state p {
      font-size: 14px;
      line-height: 1.8;
    }

    .card-preview-box {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(102,75,58,0.06);
      margin-bottom: 16px;
    }

    .profile-card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(102,75,58,0.06);
    }
    .profile-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #F0E8E2;
    }
    .profile-row:last-of-type {
      border-bottom: none;
    }
    .profile-row .label {
      font-size: 14px;
      color: #9A8A7E;
    }
    .profile-row .value {
      font-size: 14px;
      color: #664B3A;
      font-weight: 500;
    }
    .profile-row button {
      background: none;
      border: none;
      color: #664B3A;
      font-size: 13px;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .profile-row button:active {
      background: #F0E8E2;
    }
    .logout-btn {
      width: 100%;
      padding: 14px;
      background: #FFF0EE;
      color: #C0392B;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 16px;
      transition: opacity 0.2s;
    }
    .logout-btn:active {
      opacity: 0.7;
    }

    .bottom-tab {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #fff;
      display: flex;
      border-top: 1px solid #F0E8E2;
      padding: 6px 0;
      padding-bottom: max(6px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    .tab-item {
      flex: 1;
      text-align: center;
      padding: 6px 0;
      cursor: pointer;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-item .tab-icon {
      font-size: 20px;
      display: block;
      margin-bottom: 2px;
    }
    .tab-item .tab-label {
      font-size: 11px;
      color: #C4B5A9;
      letter-spacing: 0.3px;
    }
    .tab-item.active .tab-label {
      color: #664B3A;
      font-weight: 600;
    }

    .brand-slogan {
      text-align: center;
      margin-top: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #DBC6B4;
      letter-spacing: 1px;
    }

    .feedback-tag {
      display: inline-block;
      background: #E8F0E8;
      color: #2D7D46;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 20px;
      border-radius: 10px;
      margin-bottom: 4px;
    }

    .add-pet-btn {
      text-align: center;
      margin-top: 8px;
      margin-bottom: 20px;
    }
    .add-pet-btn button {
      background: #664B3A;
      color: #DBC6B4;
      border: none;
      padding: 12px 32px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .add-pet-btn button:active {
      opacity: 0.8;
    }

    .modal-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #F0E8E2;
      border-radius: 12px;
      font-size: 15px;
      color: #664B3A;
      background: #F9F5F2;
      outline: none;
      font-family: inherit;
      transition: border 0.2s;
    }
    .modal-input:focus {
      border-color: #DBC6B4;
    }
    .modal-input[type="date"] {
      height: 48px;
      line-height: 24px;
      -webkit-appearance: none;
      appearance: none;
      padding: 12px 14px;
      box-sizing: border-box;
    }
    .modal-input::placeholder {
      color: #DBC6B4;
    }
    .modal-select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #F0E8E2;
      border-radius: 12px;
      font-size: 15px;
      color: #664B3A;
      background: #F9F5F2;
      outline: none;
      font-family: inherit;
      transition: border 0.2s;
    }
    .modal-select:focus {
      border-color: #DBC6B4;
    }
    .modal-btn-primary {
      flex: 1;
      padding: 12px;
      background: #664B3A;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal-btn-primary:active { opacity: 0.8; }
    .modal-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .modal-btn-cancel {
      flex: 1;
      padding: 12px;
      background: #F0E8E2;
      color: #9A8A7E;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .modal-btn-cancel:active { opacity: 0.7; }

    .yoto-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .yoto-modal-box {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px 24px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.12);
      animation: modalPop 0.2s ease;
    }
    @keyframes modalPop {
      from { transform: scale(0.92); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .yoto-modal-box .yoto-modal-title {
      font-size: 17px;
      font-weight: 600;
      color: #664B3A;
      margin-bottom: 8px;
    }
    .yoto-modal-box .yoto-modal-body {
      font-size: 14px;
      color: #664B3A;
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .yoto-modal-box .yoto-modal-input-box {
      margin-bottom: 16px;
    }
    .yoto-modal-box .yoto-modal-input-box input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #F0E8E2;
      border-radius: 12px;
      font-size: 15px;
      color: #664B3A;
      background: #F9F5F2;
      outline: none;
      font-family: inherit;
    }
    .yoto-modal-box .yoto-modal-input-box input:focus {
      border-color: #DBC6B4;
    }
    .yoto-modal-actions {
      display: flex;
      gap: 10px;
    }
    .yoto-modal-actions .btn-cancel {
      flex: 1;
      padding: 12px;
      background: #F0E8E2;
      color: #9A8A7E;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .yoto-modal-actions .btn-cancel:active { opacity: 0.7; }
    .yoto-modal-actions .btn-confirm {
      flex: 1;
      padding: 12px;
      background: #664B3A;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .yoto-modal-actions .btn-confirm:active { opacity: 0.8; }
    .yoto-modal-actions .btn-confirm.danger {
      background: #C0392B;
    }
  </style>
</head>
<body>

  <nav class="top-nav">
    <div class="brand">
      <span>🐾 YOTOPIA</span>
    </div>
    <button class="profile-btn" onclick="switchTab('profile')">👤 我的</button>
  </nav>

  <div id="page-home" class="page active">
    <div id="pet-card-container"></div>
    <div class="brand-slogan">让陪伴，融入自然</div>
  </div>

  <div id="page-pets" class="page">
    <div class="page-title">🐱 我的宠物</div>
    <div id="pet-detail-container"></div>
  </div>

  <div id="page-card" class="page">
    <div class="page-title">🎴 专属卡片</div>
    <div id="card-content-area"></div>
  </div>

  <div id="page-profile" class="page">
    <div class="page-title">👤 我的</div>
    <div class="profile-card">
      <div class="profile-row">
        <span class="label">微信号</span>
        <span class="value" id="profile-wechat">-</span>
      </div>
      <div class="profile-row">
        <span class="label">昵称</span>
        <span class="value" id="profile-name">-</span>
      </div>
      <div class="profile-row">
        <span class="label">修改密码</span>
        <button onclick="handleChangePassword()">修改 →</button>
      </div>
      <button class="logout-btn" onclick="showConfirm('确认退出登录？', handleLogout)">退出登录</button>
    </div>
  </div>

  <div class="bottom-tab">
    <div class="tab-item active" onclick="switchTab('home')" data-tab="home">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">首页</span>
    </div>
    <div class="tab-item" onclick="switchTab('pets')" data-tab="pets">
      <span class="tab-icon">🐱</span>
      <span class="tab-label">宠物</span>
    </div>
    <div class="tab-item" onclick="switchTab('card')" data-tab="card">
      <span class="tab-icon">🎴</span>
      <span class="tab-label">专属卡片</span>
    </div>
    <div class="tab-item" onclick="switchTab('profile')" data-tab="profile">
      <span class="tab-icon">👤</span>
      <span class="tab-label">我的</span>
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://yotopia.pet';
    let currentUser = null;
    let userPets = [];

    (function() {
      const stored = localStorage.getItem('yotopia_user');
      if (!stored) {
        window.location.href = 'index.html';
        return;
      }
      currentUser = JSON.parse(stored);
      loadProfile();
      loadPets();
    })();

    // ===== 全局确认弹窗 =====
    function showConfirm(message, onConfirm, onCancel, confirmText, isDanger) {
      var old = document.getElementById('yoto-global-confirm');
      if (old) old.remove();

      var overlay = document.createElement('div');
      overlay.id = 'yoto-global-confirm';
      overlay.className = 'yoto-modal-overlay';

      var safeMsg = (message || '').replace(/</g, '&lt;').replace(/\n/g, '<br>');

      overlay.innerHTML = '\
        <div class="yoto-modal-box">\
          <div class="yoto-modal-title">⚠️ 确认</div>\
          <div class="yoto-modal-body">' + safeMsg + '</div>\
          <div class="yoto-modal-actions">\
            <button class="btn-cancel" id="yoto-confirm-cancel">取消</button>\
            <button class="btn-confirm' + (isDanger ? ' danger' : '') + '" id="yoto-confirm-ok">' + (confirmText || '确认') + '</button>\
          </div>\
        </div>';

      document.body.appendChild(overlay);

      document.getElementById('yoto-confirm-cancel').addEventListener('click', function() {
        overlay.remove();
        if (typeof onCancel === 'function') onCancel();
      });

      document.getElementById('yoto-confirm-ok').addEventListener('click', function() {
        overlay.remove();
        if (typeof onConfirm === 'function') onConfirm();
      });

      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) {
          overlay.remove();
          if (typeof onCancel === 'function') onCancel();
        }
      });
    }

    function showPromptModal(title, fields, onConfirm) {
      var old = document.getElementById('yoto-prompt-modal');
      if (old) old.remove();

      var overlay = document.createElement('div');
      overlay.id = 'yoto-prompt-modal';
      overlay.className = 'yoto-modal-overlay';

      var inputsHtml = '';
      for (var i = 0; i < fields.length; i++) {
        var f = fields[i];
        var inputType = f.type || 'text';
        var placeholder = f.placeholder || '';
        var id = 'yoto-prompt-input-' + i;
        inputsHtml += '\
          <div class="yoto-modal-input-box">\
            <input type="' + inputType + '" id="' + id + '" placeholder="' + placeholder + '">\
          </div>';
      }

      overlay.innerHTML = '\
        <div class="yoto-modal-box">\
          <div class="yoto-modal-title">' + title + '</div>\
          <div class="yoto-modal-body" id="yoto-prompt-error" style="color:#C0392B;display:none;"></div>\
          ' + inputsHtml + '\
          <div class="yoto-modal-actions">\
            <button class="btn-cancel" id="yoto-prompt-cancel">取消</button>\
            <button class="btn-confirm" id="yoto-prompt-ok">确认</button>\
          </div>\
        </div>';

      document.body.appendChild(overlay);

      setTimeout(function() {
        var firstInput = document.getElementById('yoto-prompt-input-0');
        if (firstInput) firstInput.focus();
      }, 150);

      overlay.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          document.getElementById('yoto-prompt-ok').click();
        }
      });

      document.getElementById('yoto-prompt-cancel').addEventListener('click', function() {
        overlay.remove();
      });

      document.getElementById('yoto-prompt-ok').addEventListener('click', function() {
        var values = [];
        for (var i = 0; i < fields.length; i++) {
          values.push(document.getElementById('yoto-prompt-input-' + i).value);
        }
        if (typeof onConfirm === 'function') {
          var result = onConfirm(values);
          if (result === false) return;
        }
        overlay.remove();
      });

      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) overlay.remove();
      });
    }

    function showPromptError(msg) {
      var el = document.getElementById('yoto-prompt-error');
      if (el) {
        el.textContent = msg;
        el.style.display = 'block';
      }
    }

    // ===== 页面切换 =====
    function switchTab(tab) {
      document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
      document.getElementById('page-' + tab).classList.add('active');
      document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
      const activeTab = document.querySelector(`.tab-item[data-tab="${tab}"]`);
      if (activeTab) activeTab.classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });

      if (tab === 'card') {
        loadMyCard();
      }
    }

    function getFeedbackCardIds() {
      try {
        return JSON.parse(localStorage.getItem('yotopia_feedback_done') || '[]');
      } catch { return []; }
    }

    function addFeedbackCardId(cardId) {
      const list = getFeedbackCardIds();
      const idStr = String(cardId);
      if (!list.includes(idStr)) {
        list.push(idStr);
        localStorage.setItem('yotopia_feedback_done', JSON.stringify(list));
      }
    }

    async function loadPets() {
      try {
        const res = await fetch(`${WORKER_URL}/api/my-pets`, {
          headers: { 'X-User-Id': currentUser.id }
        });
        const data = await res.json();
        if (data.success && data.pets) {
          userPets = data.pets;
        }
      } catch (e) {
        console.error('获取宠物失败:', e);
      }
      renderPets();
    }

    // ===== 🆕 首页大图渲染 =====
    function renderHomePets() {
      const container = document.getElementById('pet-card-container');

      if (!userPets || userPets.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🐾</div>
            <p>还没有添加宠物<br>点击下方添加你的第一只宠物 🐱</p>
          </div>
          <div class="add-pet-btn"><button onclick="addPet()">➕ 添加新宠物</button></div>
        `;
        return;
      }

      // 横向滑动容器
      var html = '<div class="home-pet-scroll" id="homePetScroll">';

      userPets.forEach(function(pet) {
        var hasPhoto = pet.photo_url && pet.photo_url !== '';

        var photoSection;
        if (hasPhoto) {
          // 🆕 有大图 → 点击跳转到宠物tab
          photoSection = '<img class="home-pet-photo" src="' + pet.photo_url + '" alt="' + (pet.name || '') + '" onclick="switchTab(\'pets\')">';
        } else {
          // 🆕 无照片 → 显示占位提示，点击跳转
          photoSection = '\
            <div class="home-pet-photo-placeholder" onclick="switchTab(\'pets\')">\
              <div class="placeholder-icon">📸</div>\
              <div class="placeholder-text">前往宠物档案上传照片</div>\
              <div class="placeholder-sub">点击跳转</div>\
            </div>';
        }

        var genderText = '';
        if (pet.gender === 'male') genderText = ' · 男孩';
        else if (pet.gender === 'female') genderText = ' · 女孩';

        html += '\
          <div class="home-pet-card">\
            ' + photoSection + '\
            <div class="home-pet-info">\
              <div class="pet-name">' + (pet.name || '未命名') + '</div>\
              <div class="pet-meta">\
                ' + (pet.birthday ? '🎂 ' + pet.birthday : '') + '' + genderText + '\
              </div>\
            </div>\
          </div>';
      });

      html += '</div>';

      // 🆕 圆点指示器（多宠物时显示）
      if (userPets.length > 1) {
        html += '<div class="home-dots" id="homeDots">';
        for (var i = 0; i < userPets.length; i++) {
          html += '<div class="home-dot' + (i === 0 ? ' active' : '') + '" data-index="' + i + '"></div>';
        }
        html += '</div>';
      }

      // 添加新宠物按钮
      html += '<div class="add-pet-btn"><button onclick="addPet()">➕ 添加新宠物</button></div>';

      container.innerHTML = html;

      // 🆕 滑动监听 → 更新圆点
      if (userPets.length > 1) {
        var scrollEl = document.getElementById('homePetScroll');
        if (scrollEl) {
          scrollEl.addEventListener('scroll', function() {
            var cards = this.querySelectorAll('.home-pet-card');
            if (cards.length === 0) return;
            var cardWidth = cards[0].offsetWidth;
            var gap = 16;
            var total = cardWidth + gap;
            var index = Math.round(this.scrollLeft / total);
            if (index >= cards.length) index = cards.length - 1;
            if (index < 0) index = 0;

            var dots = document.querySelectorAll('.home-dot');
            dots.forEach(function(dot, i) {
              dot.classList.toggle('active', i === index);
            });
          });

          // 点击圆点跳转到对应卡片
          document.querySelectorAll('.home-dot').forEach(function(dot) {
            dot.addEventListener('click', function() {
              var index = parseInt(this.getAttribute('data-index'));
              var cards = scrollEl.querySelectorAll('.home-pet-card');
              if (cards[index]) {
                var cardWidth = cards[0].offsetWidth;
                var gap = 16;
                scrollEl.scrollTo({
                  left: index * (cardWidth + gap),
                  behavior: 'smooth'
                });
              }
            });
          });
        }
      }
    }

    // ===== 上传照片 =====
    function showUploadPhotoConfirm(petId) {
      var pet = userPets.find(function(p) { return p.id === petId; });
      var petName = pet ? (pet.name || '宠物') : '宠物';

      showConfirm(
        '📸 为「' + petName + '」上传照片\n\n⚠️ 建议使用 2MB 以内的清晰照片\n照片过大可能导致上传速度变慢',
        function() {
          actuallyUploadPhoto(petId);
        },
        null,
        '选择照片',
        false
      );
    }

    function actuallyUploadPhoto(petId) {
      var input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';

      input.onchange = async function(e) {
        var file = e.target.files[0];
        if (!file) return;

        var sizeMB = (file.size / (1024 * 1024)).toFixed(1);

        if (file.size > 5 * 1024 * 1024) {
          showConfirm(
            '⚠️ 照片大小约 ' + sizeMB + 'MB\n\n超过 5MB 可能会上传很慢，是否继续？',
            function() { doUpload(petId, file); },
            null,
            '继续上传',
            false
          );
          return;
        } else if (file.size > 2 * 1024 * 1024) {
          showConfirm(
            '⏳ 照片大小约 ' + sizeMB + 'MB\n\n超过 2MB 上传速度可能较慢，是否继续？',
            function() { doUpload(petId, file); },
            null,
            '继续上传',
            false
          );
          return;
        }

        doUpload(petId, file);
      };

      input.click();
    }

    async function doUpload(petId, file) {
      var formData = new FormData();
      formData.append('pet_id', petId);
      formData.append('photo', file);

      try {
        var btn = document.querySelector('button[onclick*="showUploadPhotoConfirm"]');
        if (btn) { btn.textContent = '⏳ 上传中...'; btn.disabled = true; }

        var res = await fetch(WORKER_URL + '/api/upload-photo', {
          method: 'POST',
          headers: { 'X-User-Id': currentUser.id },
          body: formData
        });
        var data = await res.json();
        if (data.success) {
          showConfirm('📸 照片上传成功！', function() { loadPets(); }, null, '好的', false);
        } else {
          showConfirm('上传失败：' + (data.message || '请重试'), null, null, '知道了', false);
        }
      } catch (e) {
        showConfirm('网络错误，请稍后重试', null, null, '知道了', false);
      } finally {
        if (btn) { btn.textContent = '📸 上传照片'; btn.disabled = false; }
      }
    }

          <h3 style="font-size:17px;color:#664B3A;margin-bottom:16px;">🔄 需要修改的内容</h3>\
          <label style="font-size:13px;color:#9A8A7E;display:block;margin-bottom:4px;">请描述不满意的地方</label>\
          <textarea id="feedback-comment" rows="4" style="width:100%;padding:12px;border:1.5px solid #F0E8E2;border-radius:10px;font-size:14px;color:#664B3A;background:#F9F5F2;outline:none;margin-bottom:16px;resize:vertical;" placeholder="例如：颜色不够柔和、字体太大、宠物照片不太像..."></textarea>\
          <div style="margin-bottom:16px;">\
            <label style="font-size:13px;color:#9A8A7E;display:block;margin-bottom:8px;">\
              <input type="checkbox" id="feedback-replace-photo">\
              对图片不满意，我想上传一张新照片\
            </label>\
            <div id="feedback-photo-area" style="display:none;">\
              <input type="file" id="feedback-photo-input" accept="image/*" style="font-size:13px;color:#664B3A;">\
              <img id="feedback-photo-preview" style="width:100%;max-width:200px;border-radius:10px;margin-top:8px;display:none;">\
            </div>\
          </div>\
          <p style="font-size:12px;color:#9A8A7E;margin-bottom:12px;">提交后不能修改，请确认内容无误</p>\
          <div style="display:flex;gap:10px;">\
            <button id="btn-cancel-feedback" style="flex:1;padding:12px;background:#F0E8E2;color:#9A8A7E;border:none;border-radius:10px;font-size:14px;cursor:pointer;">取消</button>\
            <button id="btn-submit-feedback" style="flex:1;padding:12px;background:#C0392B;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">确认提交反馈</button>\
          </div>\
        </div>';

      document.body.appendChild(overlay);

      document.getElementById('feedback-replace-photo').addEventListener('change', function() {
        var area = document.getElementById('feedback-photo-area');
        area.style.display = this.checked ? 'block' : 'none';
        if (this.checked) {
          document.getElementById('feedback-photo-input').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(ev) {
              var preview = document.getElementById('feedback-photo-preview');
              preview.src = ev.target.result;
              preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
          });
        }
      });

      document.getElementById('btn-cancel-feedback').addEventListener('click', function() {
        overlay.remove();
      });

      document.getElementById('btn-submit-feedback').addEventListener('click', function() {
        submitUnsatisfied(cardId);
      });

      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) overlay.remove();
      });
    }

    async function submitUnsatisfied(cardId) {
      var commentEl = document.getElementById('feedback-comment');
      var comment = commentEl ? commentEl.value.trim() : '';
      var photoInput = document.getElementById('feedback-photo-input');
      var photoFile = photoInput ? photoInput.files[0] : null;

      if (!comment && !photoFile) {
        showConfirm('请填写需要修改的文字说明，或上传一张新照片', null, null, '知道了', false);
        return;
      }

      var btn = document.getElementById('btn-submit-feedback');
      if (btn) {
        btn.disabled = true;
        btn.textContent = '提交中...';
      }

      var formData = new FormData();
      formData.append('user_id', currentUser.id);
      formData.append('card_id', cardId);
      formData.append('satisfaction', 'unsatisfied');
      formData.append('comment', comment);
      if (photoFile) formData.append('new_photo', photoFile);

      try {
        var res = await fetch(WORKER_URL + '/api/card-feedback', {
          method: 'POST',
          body: formData
        });
        var data = await res.json();
        if (data.success) {
          addFeedbackCardId(cardId);
          var modal = document.getElementById('feedback-modal');
          if (modal) modal.remove();
          showConfirm('📩 反馈已提交！管理员会尽快修改 ✅', function() { loadMyCard(); }, null, '好的', false);
        } else {
          showConfirm('提交失败：' + (data.message || '请重试'), null, null, '知道了', false);
        }
      } catch (e) {
        showConfirm('网络错误，请稍后重试', null, null, '知道了', false);
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = '确认提交反馈';
        }
      }
    }

    // ===== 修改密码 =====
    function handleChangePassword() {
      showPromptModal(
        '🔑 修改密码',
        [
          { type: 'password', placeholder: '当前密码（首次设置请留空）' },
          { type: 'password', placeholder: '新密码（至少4位）' },
          { type: 'password', placeholder: '再次输入新密码' }
        ],
        function(values) {
          var oldPw = values[0] || '';
          var newPw = values[1] || '';
          var confirmPw = values[2] || '';

          if (!newPw || newPw.length < 4) {
            showPromptError('密码至少4位');
            return false;
          }
          if (newPw !== confirmPw) {
            showPromptError('两次密码不一致');
            return false;
          }

          setTimeout(function() {
            doChangePassword(oldPw, newPw);
          }, 100);

          return true;
        }
      );
    }

    async function doChangePassword(oldPw, newPw) {
      try {
        var res = await fetch(WORKER_URL + '/api/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: currentUser.id,
            old_password: oldPw || '',
            new_password: newPw
          })
        });
        var data = await res.json();
        if (data.success) {
          showConfirm('密码修改成功 ✅', null, null, '好的', false);
        } else {
          showConfirm(data.message || '修改失败', null, null, '知道了', false);
        }
      } catch (e) {
        showConfirm('网络错误', null, null, '知道了', false);
      }
    }

    function handleLogout() {
      localStorage.removeItem('yotopia_user');
      window.location.href = 'index.html';
    }

    function loadProfile() {
      document.getElementById('profile-wechat').textContent = currentUser.wechat_id;
      document.getElementById('profile-name').textContent = currentUser.display_name || currentUser.wechat_id;
    }
  </script>
</body>
</html>
