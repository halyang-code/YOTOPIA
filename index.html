<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YOTOPIA · 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif;
      background: #F5EDE8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-wrap {
      background: #fff;
      border-radius: 24px;
      padding: 40px 32px 24px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 40px rgba(102,75,58,0.10);
    }
    /* ---- Logo ---- */
    .logo-area {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-img {
      max-width: 140px;
      display: block;
      margin: 0 auto 8px;
    }
    .logo-area .slogan {
      font-size: 12px;
      color: #C4B5A9;
      margin-top: 2px;
      letter-spacing: 1px;
    }
    /* ---- 输入框 ---- */
    .input-group { margin-bottom: 16px; }
    .input-group label {
      display: block; font-size: 13px; font-weight: 500; color: #9A8A7E; margin-bottom: 6px;
    }
    .input-group input {
      width: 100%; padding: 14px 16px; border: 2px solid #E8DDD6;
      border-radius: 12px; font-size: 15px; outline: none;
      background: #FAF8F6; transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: #664B3A; background: #fff; }
    .input-group input::placeholder { color: #C4B5A9; }
    /* ---- 提示文字 ---- */
    .hint {
      text-align: center;
      font-size: 12px;
      color: #C4B5A9;
      margin: 8px 0 4px;
      line-height: 1.6;
    }
    /* ---- 按钮 ---- */
    .btn-login {
      width: 100%; padding: 15px; background: #664B3A; color: #DBC6B4;
      border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 12px; transition: opacity 0.2s;
    }
    .btn-login:active { opacity: 0.85; }
    .btn-login:disabled { background: #DBC6B4; color: #9A8A7E; cursor: not-allowed; }
    /* ---- 消息提示 ---- */
    .msg {
      padding: 10px 14px; border-radius: 10px; font-size: 13px;
      margin-bottom: 12px; display: none; text-align: center;
    }
    .msg.error { display: block; background: #FFF0EE; color: #C0392B; }
    .msg.success { display: block; background: #E8F5E9; color: #27AE60; }
    .msg.info { display: block; background: #FFF8E1; color: #8D6E2B; }
    /* ---- 管理员入口 ---- */
    .admin-entry {
      text-align: center;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #F0E8E2;
    }
    .admin-entry a {
      color: #DBC6B4;
      font-size: 12px;
      text-decoration: none;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .admin-entry a:hover { color: #664B3A; }
    /* ---- 弹窗 ---- */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff; border-radius: 20px; padding: 32px 28px;
      width: 90%; max-width: 340px;
    }
    .modal h3 { color: #664B3A; text-align: center; margin-bottom: 20px; font-size: 18px; }
    .modal input {
      width: 100%; padding: 12px 14px; border: 2px solid #E8DDD6;
      border-radius: 10px; font-size: 15px; margin-bottom: 12px; outline: none;
    }
    .modal input:focus { border-color: #664B3A; }
    .modal .btn-row { display: flex; gap: 10px; margin-top: 8px; }
    .modal .btn-row button {
      flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 15px; cursor: pointer;
    }
    .modal .btn-primary { background: #664B3A; color: #DBC6B4; }
    .modal .btn-secondary { background: #F0E8E2; color: #664B3A; }
    .modal .modal-msg {
      padding: 8px 12px; border-radius: 8px; font-size: 12px;
      margin-bottom: 12px; display: none; text-align: center;
    }
    .modal .modal-msg.error { display: block; background: #FFF0EE; color: #C0392B; }
    .modal .modal-msg.success { display: block; background: #E8F5E9; color: #27AE60; }
    /* ---- 底部 ---- */
    .brand-footer {
      text-align: center; margin-top: 18px;
      font-size: 11px; color: #DBC6B4; letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="login-wrap">
    <!-- Logo 图片 -->
    <div class="logo-area">
      <img class="logo-img" src="https://fmyuscjbteiekhiaimgv.supabase.co/storage/v1/object/public/yotopia-assets/indexlogo.png" alt="YOTOPIA">
      <div class="slogan"> </div>
    </div>

    <div id="msg-login" class="msg"></div>

    <!-- 微信号 -->
    <div class="input-group">
      <label>微信号</label>
      <input type="text" id="input-wechat" placeholder="输入微信号登录" autocomplete="username">
    </div>

    <!-- 密码 -->
    <div class="input-group">
      <label>密码</label>
      <input type="password" id="input-password" placeholder="输入密码" autocomplete="current-password">
    </div>

    <!-- 提示文字 -->
    <div class="hint">首次登录，无需密码，登录后可进行修改</div>

    <!-- 登录按钮 -->
    <button class="btn-login" id="btn-login" onclick="handleLogin()">登 录</button>

    <!-- 管理员入口 -->
    <div class="admin-entry">
      <a onclick="openAdminModal()">🔒 管理员登录</a>
    </div>

    <!-- 品牌底标 -->
    <div class="brand-footer">🐾 YOTOPIA ｜ Your Utopia</div>
  </div>

  <!-- ====== 管理员登录弹窗 ====== -->
  <div class="modal-overlay" id="admin-modal">
    <div class="modal">
      <h3>🔒 管理员登录</h3>
      <div id="admin-msg" class="modal-msg"></div>
      <input type="text" id="admin-user" placeholder="管理员账号">
      <input type="password" id="admin-pass" placeholder="密码">
      <div class="btn-row">
        <button class="btn-secondary" onclick="closeAdminModal()">取消</button>
        <button class="btn-primary" onclick="handleAdminLogin()">登录</button>
      </div>
    </div>
  </div>

  <script>
    const WORKER_URL = 'https://delicate-dew-63c6.andy99jjc.workers.dev';

    // ====== 用户登录 ======
    async function handleLogin() {
      const wechat_id = document.getElementById('input-wechat').value.trim();
      const password = document.getElementById('input-password').value.trim();
      const msg = document.getElementById('msg-login');
      const btn = document.getElementById('btn-login');

      if (!wechat_id) { showMsg(msg, '请输入微信号', 'error'); return; }

      btn.disabled = true;
      btn.textContent = '登录中...';

      try {
        const res = await fetch(`${WORKER_URL}/api/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ wechat_id, password })
        });
        const data = await res.json();

        if (data.success && data.needs_setup) {
          const newPw = prompt('首次登录，请设置你的密码（至少4位）：');
          if (!newPw || newPw.length < 4) {
            showMsg(msg, '密码至少4位，请重试', 'error');
            btn.disabled = false;
            btn.textContent = '登 录';
            return;
          }

          const pwRes = await fetch(`${WORKER_URL}/api/change-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: data.user.id, old_password: '', new_password: newPw })
          });
          const pwData = await pwRes.json();

          if (pwData.success) {
            showMsg(msg, '密码设置成功 ✅ 正在登录...', 'success');
            setTimeout(async () => {
              const finalLogin = await fetch(`${WORKER_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ wechat_id, password: newPw })
              });
              const finalData = await finalLogin.json();
              if (finalData.success) {
                localStorage.setItem('yotopia_user', JSON.stringify(finalData.user));
                window.location.href = 'main.html';
              }
            }, 800);
          } else {
            showMsg(msg, pwData.message || '设置失败', 'error');
            btn.disabled = false;
            btn.textContent = '登 录';
          }
          return;
        }

        if (data.success) {
          localStorage.setItem('yotopia_user', JSON.stringify(data.user));
          window.location.href = 'main.html';
        } else {
          showMsg(msg, data.message || '登录失败', 'error');
          btn.disabled = false;
          btn.textContent = '登 录';
        }
      } catch (e) {
        showMsg(msg, '网络错误，请稍后再试', 'error');
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    }

    // ====== 管理员弹窗 ======
    function openAdminModal() {
      document.getElementById('admin-modal').classList.add('show');
      document.getElementById('admin-user').value = '';
      document.getElementById('admin-pass').value = '';
      document.getElementById('admin-msg').className = 'modal-msg';
    }

    function closeAdminModal() {
      document.getElementById('admin-modal').classList.remove('show');
    }

    async function handleAdminLogin() {
      const username = document.getElementById('admin-user').value.trim();
      const password = document.getElementById('admin-pass').value.trim();
      const msg = document.getElementById('admin-msg');

      if (!username || !password) { showModalMsg(msg, '请填写完整', 'error'); return; }

      try {
        const res = await fetch(`${WORKER_URL}/api/admin/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
          localStorage.setItem('yotopia_admin', 'true');
          window.location.href = 'admin.html';
        } else {
          showModalMsg(msg, data.message || '登录失败', 'error');
        }
      } catch (e) {
        showModalMsg(msg, '网络错误', 'error');
      }
    }

    // ====== 工具 ======
    function showMsg(el, text, type) {
      el.textContent = text;
      el.className = 'msg ' + type;
      setTimeout(() => { el.className = 'msg'; }, 5000);
    }

    function showModalMsg(el, text, type) {
      el.textContent = text;
      el.className = 'modal-msg ' + type;
      setTimeout(() => { el.className = 'modal-msg'; }, 4000);
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        const modalOpen = document.getElementById('admin-modal').classList.contains('show');
        if (modalOpen) handleAdminLogin();
        else handleLogin();
      }
    });

    (function() {
      if (localStorage.getItem('yotopia_user')) {
        window.location.href = 'main.html';
      }
    })();
  </script>

</body>
</html>
